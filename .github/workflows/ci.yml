name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: insighta_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -prootpassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint (TypeScript check)
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run tests
        env:
          NODE_ENV: test
          PORT: 3001
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: rootpassword
          DB_NAME_TEST: insighta_test
          JWT_ACCESS_SECRET: test_access_secret_min_32_chars_long
          JWT_REFRESH_SECRET: test_refresh_secret_min_32_chars_long
          GITHUB_CLIENT_ID: test_client_id
          GITHUB_CLIENT_SECRET: test_client_secret
          GITHUB_CALLBACK_URL: http://localhost:3001/auth/github/callback
          FRONTEND_URL: http://localhost:5173
        run: npm test